<section class="mv-section particles-bg">
  <div class="mv-container">
    <!-- Section Badge -->
    <div appScrollReveal="fade-up" class="mv-badge-wrapper">
      <span class="section-badge">{{ i18n.t('nav.about') }}</span>
    </div>

    <div class="mv-grid">
      <!-- Mission Card -->
      <div appScrollReveal="fade-right" [revealDelay]="100" class="mv-card group card-lift gradient-border">
        <!-- Decorative corner -->
        <div class="mv-card-corner"></div>
        <div class="mv-card-content">
          <div class="mv-card-header">
            <h3 class="mv-card-title" appTypewriter [typeDelay]="400" [typeSpeed]="60">{{ i18n.t('mission.title') }}</h3>
            <div class="mv-card-icon">
              <svg class="mv-card-icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
              </svg>
            </div>
          </div>
          <p class="mv-card-text">
            {{ i18n.t('mission.text') }}
          </p>
        </div>
      </div>

      <!-- Vision Card -->
      <div appScrollReveal="fade-left" [revealDelay]="250" class="mv-card group card-lift gradient-border">
        <!-- Decorative corner -->
        <div class="mv-card-corner"></div>
        <div class="mv-card-content">
          <div class="mv-card-header">
            <h3 class="mv-card-title" appTypewriter [typeDelay]="800" [typeSpeed]="60">{{ i18n.t('vision.title') }}</h3>
            <div class="mv-card-icon">
              <svg class="mv-card-icon-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </div>
          </div>
          <p class="mv-card-text">
            {{ i18n.t('vision.text') }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
