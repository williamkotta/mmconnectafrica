name: Deploy Angular

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4
    # 2. Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 3. Install dependencies and Build Angular
    - name: Install and Build
      run: |
        npm install
        npm run build -- --configuration=production

    # Sync the DIST folder to the server
    # For Angular 17, the output is usually in dist/project-name/browser
    - name: Sync build files to server
      uses: burnett01/rsync-deployments@v8
      with:
        remote_host: ${{ secrets.SERVER_HOST }}
        remote_user: ${{ secrets.SERVER_USER }}
        remote_key: ${{ secrets.SERVER_SSH_KEY }}
        path: "dist/kuza-website/browser/" 
        remote_path: /var/www/test.kuza.co.tz/browser/
        # switches: "-avz --delete --exclude='.git/' --no-perms --checksum"
        switches: "-avz --delete --exclude='.git/' --no-perms --no-times --omit-dir-times"

    # 5. Set Permissions
    - name: Set permissions on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # We don't use sudo here because mmkuza already owns the folder
          chown -R mmkuza:www-data /var/www/test.kuza.co.tz
          chmod -R 755 /var/test.kuza.co.tz